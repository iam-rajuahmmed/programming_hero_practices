<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Internal CSS, Inline, External</title>
    <style>
        
        .header_one {
            color: blue;
            border: 2px solid red;
            padding: 10px;
            margin: 10px;
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <h1>Internal CSS</h1>
    <p class="internal">This is an internal CSS example.</p>

    <h1>Inline CSS</h1>
    <p style="color: green;">This is an inline CSS example.</p>

    <h1>External CSS</h1>
    <p class="external">This is an external CSS example.</p>

    <div class="main_heaing">
        <h1 class="header_one">My Fast header in CSS</h1>

    </div>
    
</body>
</html>
